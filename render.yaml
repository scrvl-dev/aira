services:
  - type: web
    name: ih-batch-review
    env: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false  # Set this in Render dashboard — never commit
      - key: APP_USERNAME
        sync: false  # Shared login for the team (e.g. "team")
      - key: APP_PASSWORD
        sync: false  # Shared password — set in Render dashboard, never commit
      - key: PYTHON_VERSION
        value: 3.11.0
